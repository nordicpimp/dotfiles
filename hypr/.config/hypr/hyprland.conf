# =============================================================================
# SOURCES
# =============================================================================

source = ~/.config/hypr/nvidia.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/autostart.conf
source = ~/.cache/matugen/colors-hyprland.conf

# =============================================================================
# GENERAL
# =============================================================================

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = master     # or: dwindle — see tiling layout section below
    col.active_border = $color_active_border $color_secondary 45deg
    col.inactive_border = $color_inactive_border
}

# =============================================================================
# DECORATION
# =============================================================================

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 3
    }
    shadow {
        enabled = true
        range = 12
        color = rgba(0,0,0,0.4)
    }
}

# =============================================================================
# ANIMATIONS
# =============================================================================

animations {
    enabled = true
    bezier = ease, 0.4, 0.0, 0.2, 1.0
    animation = windows, 1, 4, ease, slide
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 5, ease, slide
}

# =============================================================================
# INPUT
# =============================================================================

input {
    kb_layout = se
    follow_mouse = 1
    sensitivity = 0
}

# =============================================================================
# LAYOUT SETTINGS
# =============================================================================

master {
    new_status = master       # new window opens as master
    new_on_top = true
    mfact = 0.55              # master area takes 55% of screen width
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# =============================================================================
# MISC
# =============================================================================

misc {
    force_default_wallpaper = 0    # disable Hyprland default wallpaper
    disable_hyprland_logo = true
}
