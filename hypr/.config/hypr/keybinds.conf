# =============================================================================
# KEYBINDS
# =============================================================================

$mod = SUPER

# --- Applications ---
bind = $mod, Return,      exec, kitty
bind = $mod, D,           exec, rofi -show drun
bind = $mod, Tab,         exec, rofi -show window
bind = $mod, E,           exec, yazi
bind = $mod SHIFT, S,     exec, hyprpicker

# --- Windows ---
bind = $mod SHIFT, Q,     killactive
bind = $mod, F,           fullscreen
bind = $mod SHIFT, F,     togglefloating

# Move focus (HJKL)
bind = $mod, H,           movefocus, l
bind = $mod, L,           movefocus, r
bind = $mod, K,           movefocus, u
bind = $mod, J,           movefocus, d

# Move windows
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# Resize windows
binde = $mod ALT, H,      resizeactive, -40 0
binde = $mod ALT, L,      resizeactive, 40 0
binde = $mod ALT, K,      resizeactive, 0 -40
binde = $mod ALT, J,      resizeactive, 0 40

# Master layout — swap focused window into master position
bind = $mod, M,           layoutmsg, swapwithmaster

# --- Workspaces ---
bind = $mod, 1,           workspace, 1
bind = $mod, 2,           workspace, 2
bind = $mod, 3,           workspace, 3
bind = $mod, 4,           workspace, 4
bind = $mod, 5,           workspace, 5

bind = $mod SHIFT, 1,     movetoworkspace, 1
bind = $mod SHIFT, 2,     movetoworkspace, 2
bind = $mod SHIFT, 3,     movetoworkspace, 3
bind = $mod SHIFT, 4,     movetoworkspace, 4
bind = $mod SHIFT, 5,     movetoworkspace, 5

bind = $mod, mouse_down,  workspace, e+1
bind = $mod, mouse_up,    workspace, e-1

# Mouse window control
bindm = $mod, mouse:272,  movewindow
bindm = $mod, mouse:273,  resizewindow

# --- System ---
bind = $mod SHIFT, E,     exec, hyprctl dispatch exit
bind = $mod, backspace,   exec, hyprlock
bind = $mod, N,           exec, swaync-client -t

# Power menu (script created in guide 6)
bind = $mod SHIFT, P,     exec, ~/.config/rofi/scripts/powermenu.sh

# Screenshots — requires grim + slurp (installed below)
bind = , Print,           exec, grim ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,      exec, grim -g "$(slurp)" ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png

# Volume
binde = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
