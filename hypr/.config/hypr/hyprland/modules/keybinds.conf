# =============================================================================
# KEYBINDS
# =============================================================================

$mod = SUPER

# --- Applications ---
bind = $mod, Return,      exec, uwsm app -- kitty
bind = $mod, D,           exec, uwsm app -- rofi -show drun
bind = $mod, Space,       exec, uwsm app -- rofi -show window
bind = $mod, E,           exec, uwsm app -- thunar
bind = $mod, Y,           exec, uwsm app -- kitty -- yazi
bind = $mod SHIFT, S,     exec, uwsm app -- hyprpicker
bind = $mod, W,           exec, uwsm app -- /home/nordicpimp/dotfiles/rofi/.config/rofi/scripts/wallpaper-picker.sh
bind = $mod SHIFT, W,     exec, uwsm app -- /home/nordicpimp/dotfiles/shell/scripts/waybar-style.sh

# --- Windows ---
bind = $mod SHIFT, Q,     killactive
bind = $mod, F,           fullscreen
bind = $mod SHIFT, F,     togglefloating

# Move focus (HJKL)
bind = $mod, H,           movefocus, l
bind = $mod, L,           movefocus, r
bind = $mod, K,           movefocus, u
bind = $mod, J,           movefocus, d

# Move windows
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# Resize windows
binde = $mod ALT, H,      resizeactive, -40 0
binde = $mod ALT, L,      resizeactive, 40 0
binde = $mod ALT, K,      resizeactive, 0 -40
binde = $mod ALT, J,      resizeactive, 0 40

# Master layout — swap focused window into master position
bind = $mod, M,           layoutmsg, swapwithmaster

# --- Workspaces ---
# Primary monitor (DP-1): 1-4
bind = $mod, 1,           workspace, 1
bind = $mod, 2,           workspace, 2
bind = $mod, 3,           workspace, 3
bind = $mod, 4,           workspace, 4

# Secondary monitor (HDMI-A-1): 5-6
bind = $mod, 5,           workspace, 5
bind = $mod, 6,           workspace, 6

# Move window to workspace
bind = $mod SHIFT, 1,     movetoworkspace, 1
bind = $mod SHIFT, 2,     movetoworkspace, 2
bind = $mod SHIFT, 3,     movetoworkspace, 3
bind = $mod SHIFT, 4,     movetoworkspace, 4
bind = $mod SHIFT, 5,     movetoworkspace, 5
bind = $mod SHIFT, 6,     movetoworkspace, 6

# Cycle workspaces on focused monitor (m+1/m-1 stays within monitor's workspaces)
bind = $mod, Tab,         workspace, m+1
bind = $mod SHIFT, Tab,   workspace, m-1

# Mouse scroll to cycle workspaces on focused monitor
bind = $mod, mouse_down,  workspace, m+1
bind = $mod, mouse_up,    workspace, m-1

# Mouse window control
bindm = $mod, mouse:272,  movewindow
bindm = $mod, mouse:273,  resizewindow

# --- System ---
bind = $mod SHIFT, E,     exec, hyprctl dispatch exit
bind = $mod, backspace,   exec, uwsm app -- hyprlock
bind = $mod, N,           exec, swaync-client -t

# Power menu (script created in guide 6)
bind = $mod SHIFT, P,     exec, uwsm app -- /home/nordicpimp/dotfiles/rofi/.config/rofi/scripts/powermenu.sh

# Screenshots — requires grim + slurp (installed below)
bind = , Print,           exec, uwsm app -- grim ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,      exec, uwsm app -- grim -g "$(slurp)" ~/pictures/screenshots/$(date +%Y%m%d_%H%M%S).png

# Volume
binde = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
