# =============================================================================
# WORKSPACES
# =============================================================================
#
# Primary display (DP-1, landscape):     workspaces 1-4
# Secondary display (HDMI-A-1, portrait): workspaces 5-6
#
# HDMI-A-1 initialises first (ID 0) so it gets the lowest workspace numbers.
# We assign 5-6 to it explicitly and pin 1-4 to DP-1.
#
# Super+1-4       switch primary workspaces
# Super+5-6       switch secondary workspaces
# Super+Tab       next workspace on focused monitor
# Super+Shift+Tab prev workspace on focused monitor

workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:HDMI-A-1, default:true
workspace = 6, monitor:HDMI-A-1
