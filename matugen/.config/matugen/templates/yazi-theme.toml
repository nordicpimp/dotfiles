[manager]
cwd = { fg = "{{colors.primary.default.hex}}" }

hovered          = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
previewed        = { fg = "{{colors.primary.default.hex}}" }
selected         = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
hovered_selected = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }

marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
marker_copied   = { fg = "{{colors.tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}",     bg = "{{colors.error.default.hex}}" }

tab_active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
tab_inactive = { fg = "{{colors.on_surface_variant.default.hex}}" }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", italic = true }
find_position = { fg = "{{colors.primary.default.hex}}",  italic = true }

[status]
overall = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface.default.hex}}" }

sep_left  = { open = "", close = "", fg = "{{colors.outline.default.hex}}" }
sep_right = { open = "", close = "", fg = "{{colors.outline.default.hex}}" }

mode_normal  = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
mode_select  = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
mode_unset   = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }

progress_label  = { fg = "{{colors.on_surface.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}",   bg = "{{colors.surface.default.hex}}" }

perm_type  = { fg = "{{colors.on_surface.default.hex}}" }
perm_read  = { fg = "{{colors.tertiary.default.hex}}" }
perm_write = { fg = "{{colors.error.default.hex}}" }
perm_exec  = { fg = "{{colors.primary.default.hex}}" }
perm_sep   = { fg = "{{colors.outline.default.hex}}" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
value    = { fg = "{{colors.on_surface.default.hex}}" }
selected = { reversed = true }

[completion]
border   = { fg = "{{colors.outline.default.hex}}" }
active   = { bg = "{{colors.outline_variant.default.hex}}" }
inactive = { fg = "{{colors.on_surface_variant.default.hex}}" }

[tasks]
border  = { fg = "{{colors.outline.default.hex}}" }
title   = {}
hovered = { fg = "{{colors.primary.default.hex}}", underline = true }

[which]
mask            = { bg = "{{colors.surface.default.hex}}" }
cand            = { fg = "{{colors.primary.default.hex}}" }
rest            = { fg = "{{colors.on_surface_variant.default.hex}}" }
desc            = { fg = "{{colors.on_surface_variant.default.hex}}" }
separator       = "  "
separator_style = { fg = "{{colors.outline_variant.default.hex}}" }

[notify]
title_info  = { fg = "{{colors.primary.default.hex}}" }
title_warn  = { fg = "{{colors.tertiary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

icon_info  = ""
icon_warn  = ""
icon_error = ""

[filetype]
rules = [
  # Folders — use outline so they're visible but not glaring
  { mime = "inode/directory", fg = "{{colors.primary.default.hex}}" },
  # Images — tertiary accent
  { mime = "image/*",  fg = "{{colors.tertiary.default.hex}}" },
  # Media — secondary accent
  { mime = "video/*",  fg = "{{colors.secondary.default.hex}}" },
  { mime = "audio/*",  fg = "{{colors.secondary.default.hex}}" },
  # Archives — muted primary
  { mime = "application/zip",     fg = "{{colors.primary.default.hex}}" },
  { mime = "application/x-tar",   fg = "{{colors.primary.default.hex}}" },
  { mime = "application/x-bzip2", fg = "{{colors.primary.default.hex}}" },
  { mime = "application/x-xz",    fg = "{{colors.primary.default.hex}}" },
  { mime = "application/zstd",    fg = "{{colors.primary.default.hex}}" },
  # Config/data files — subtle
  { name = "*.toml", fg = "{{colors.outline.default.hex}}" },
  { name = "*.yaml", fg = "{{colors.outline.default.hex}}" },
  { name = "*.json", fg = "{{colors.outline.default.hex}}" },
  { name = "*.conf", fg = "{{colors.outline.default.hex}}" },
  # Markdown — slightly brighter
  { name = "*.md",   fg = "{{colors.on_surface_variant.default.hex}}" },
  # Executables
  { name = "*.sh",   fg = "{{colors.tertiary.default.hex}}" },
  # Fallback — normal text color
  { url = "*",       fg = "{{colors.on_surface.default.hex}}" },
]
